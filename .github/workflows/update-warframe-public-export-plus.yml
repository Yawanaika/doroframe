name: Update Warframe Public Export Plus

on:
  schedule:
    # GitHub cron uses UTC. 02:00 UTC is 10:00 Asia/Shanghai.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-warframe-public-export-plus
  cancel-in-progress: false

jobs:
  update:
    name: Check, verify, and open pull request
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install current dependencies
        run: pnpm install --frozen-lockfile

      - name: Update warframe-public-export-plus
        id: update
        shell: bash
        run: |
          current_version="$(node -p "require('./node_modules/warframe-public-export-plus/package.json').version")"
          pnpm update warframe-public-export-plus --latest
          latest_version="$(node -p "require('./node_modules/warframe-public-export-plus/package.json').version")"

          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${latest_version}" >> "$GITHUB_OUTPUT"

          if [[ "$current_version" == "$latest_version" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run item lookup regression tests
        if: steps.update.outputs.changed == 'true'
        run: pnpm exec vitest run src/tests/lib/wpep.test.ts

      - name: Build application
        if: steps.update.outputs.changed == 'true'
        run: pnpm run build

      - name: Create or update pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: automation/update-warframe-public-export-plus
          delete-branch: true
          add-paths: |
            package.json
            pnpm-lock.yaml
          commit-message: "chore(deps): update warframe-public-export-plus to ${{ steps.update.outputs.latest_version }}"
          title: "chore(deps): update warframe-public-export-plus to ${{ steps.update.outputs.latest_version }}"
          body: |
            Automated data dependency update.

            - Previous version: `${{ steps.update.outputs.current_version }}`
            - New version: `${{ steps.update.outputs.latest_version }}`
            - Verification: item lookup regression tests and production build
