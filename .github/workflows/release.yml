name: Release DoroFrame

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # latest.json 会读取并合并同一 Release 中已有的平台，顺序执行可避免并发覆盖。
      max-parallel: 1
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - name: macOS Apple Silicon
            platform: macos-latest
            rustTargets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.name }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${tag}." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "Missing GitHub Secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]]; then
            echo "Missing GitHub Secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD" >&2
            exit 1
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          # WPEP 包含大量导出 JSON，Vite 打包时会超过 CI 默认约 2 GB 的 V8 堆上限。
          NODE_OPTIONS: --max-old-space-size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: DoroFrame v${{ steps.release.outputs.version }}
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          retryAttempts: 1
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        env:
          RELEASE_ENTRY: ${{ runner.temp }}/release-changelog.md
        run: >-
          node .github/changelog/generate.mjs
          --version "${{ steps.release.outputs.version }}"
          --tag "${{ steps.release.outputs.tag }}"
          --repository "${{ github.repository }}"
          --entry-output "${RELEASE_ENTRY}"

      - name: Commit changelog
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): release ${RELEASE_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Publish completed release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ENTRY: ${{ runner.temp }}/release-changelog.md
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          gh release edit "${RELEASE_TAG}" \
            --notes-file "${RELEASE_ENTRY}" \
            --draft=false \
            --latest
